<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 - 纯静态页面</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        h1 { color: #003CA5; }
        .success { color: green; font-size: 24px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎯 聚满分 · 营业额分析</h1>
        <p class="success">✅ 如果你能看到这段文字，说明网络传输正常</p>
        <hr>
        <h2>📊 万民城店 · 2026-05</h2>
        <p><strong>门店：</strong>万民城店 | <strong>区域：</strong>孙红梅区 | <strong>月份：</strong>2026-05</p>
        
        <div style="background:#fff8e6;border:1px solid #ffc107;border-radius:8px;padding:12px;margin:16px 0;">
            <strong>💡 核心差距：</strong>本月营业额未达标，缺口¥29,852。达成率94.0%，需要分析具体原因。
        </div>
        
        <h3>核心指标</h3>
        <table style="width:100%;border-collapse:collapse;font-size:14px;">
            <tr style="background:#f0f4ff;">
                <th style="padding:10px;border:1px solid #ddd;">指标</th>
                <th style="padding:10px;border:1px solid #ddd;">实际</th>
                <th style="padding:10px;border:1px solid #ddd;">目标</th>
                <th style="padding:10px;border:1px solid #ddd;">达成率</th>
            </tr>
            <tr>
                <td style="padding:10px;border:1px solid #ddd;">营业额</td>
                <td style="padding:10px;border:1px solid #ddd;">¥470,148</td>
                <td style="padding:10px;border:1px solid #ddd;">¥500,000</td>
                <td style="padding:10px;border:1px solid #ddd;color:red;">94.0%</td>
            </tr>
            <tr>
                <td style="padding:10px;border:1px solid #ddd;">来客数</td>
                <td style="padding:10px;border:1px solid #ddd;">18,421</td>
                <td style="padding:10px;border:1px solid #ddd;">20,000</td>
                <td style="padding:10px;border:1px solid #ddd;color:red;">92.1%</td>
            </tr>
            <tr>
                <td style="padding:10px;border:1px solid #ddd;">客单价</td>
                <td style="padding:10px;border:1px solid #ddd;">¥25.52</td>
                <td style="padding:10px;border:1px solid #ddd;">¥26.00</td>
                <td style="padding:10px;border:1px solid #ddd;color:red;">98.2%</td>
            </tr>
        </table>
        
        <p style="margin-top:20px;color:#666;font-size:13px;">
            如果上面表格数据显示正常，说明问题出在JavaScript。<br>
            如果显示空白或"等待数据"，说明是网络/缓存问题。
        </p>
    </div>
</body>
</html>
